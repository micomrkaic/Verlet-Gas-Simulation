# Parabolic Vessel — Hard Sphere Gas  (config file)
# All lines starting with '#' are comments.
# Edit this file and restart to apply changes.
#
# ┌─────────────────────────────────────────────────────┐
# │  BOX SIZE — set here, cannot be changed via sliders  │
# │  Restart the simulation after changing these.        │
# └─────────────────────────────────────────────────────┘
sim_w       = 2000        # simulation area width  px (200 – 2560)
sim_h       = 1200        # simulation area height px (200 – 1440)

# ── All parameters below can also be adjusted via the in-app sliders ──

n_particles = 150        # starting count (1 – 500)
gravity     = 500.0      # px/s²
radius      = 5.0        # px
restitution = 1.0        # 0 = inelastic, 1 = elastic
mono_speed  = 220.0      # px/s  (M key reset speed)
para_a      = 0.0010     # parabola curvature (0 = flat floor)

# Oscillating ceiling piston — quasi-static if peak speed << mono_speed
# peak speed = ceil_amp * 2 * pi * ceil_freq
ceil_amp    = 0.0        # amplitude px (0 = fixed ceiling)
ceil_freq   = 0.5        # Hz
